server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location = / {
        try_files /index.html =404;
    }

    # Cache static assets aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Quartz emits leaf pages as .html files and folder pages as index.html.
    # Mirror Quartz dev-server routing so canonical URLs stay stable and
    # relative links don't break when a client lands on the wrong slash variant.
    location ~ ^/(.+)/$ {
        if (-f $document_root/$1.html) {
            return 301 /$1$is_args$args;
        }

        try_files $uri /$1/index.html =404;
    }

    location ~ ^/(.+[^/])$ {
        if (-f $document_root/$1/index.html) {
            return 301 /$1/$is_args$args;
        }

        try_files $uri /$1.html =404;
    }

    error_page 404 /404.html;
    location = /404.html {
        internal;
    }

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
    gzip_min_length 1000;
}
